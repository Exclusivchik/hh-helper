<!-- app/templates/ammap.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта регионов России - AmCharts</title>

    <!-- AmCharts 5 -->
    <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/geodata/russiaLow.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/ammap.css') }}?v=5">
</head>
<body>
    <div id="chartdiv">
        <div class="loading">Загрузка карты России...</div>
    </div>

    <div class="search-container">
        <h3>🔍 Поиск региона</h3>
        <input type="text" 
               id="regionSearch" 
               placeholder="Введите название региона..." 
               autocomplete="off">
        <div id="searchResults" class="search-results"></div>
    </div>

    <button id="backButton" class="back-button" onclick="goBackToMap()" style="display: none;">
        ← Назад к карте
    </button>

    <button id="detailsButton" class="details-button" onclick="goToRegionDetails()" style="display: none;">
        Подробнее о регионе
    </button>

    <!-- Панель статистики -->
    <div id="statsPanel" class="stats-panel" style="display: none;">
        <h3 id="statsRegionName">Статистика по региону</h3>
        <div id="statsContent" class="stats-content">
            <div class="loading-stats">Загрузка статистики...</div>
        </div>
    </div>

    <!-- External JavaScript -->
    <script src="{{ url_for('static', path='/js/ammap.js') }}?v=5"></script>
    
    <script>
        // Данные регионов из шаблона (Python -> JS)
        // Используем сериализацию в JSON чтобы корректно передать массив объектов в JavaScript
        const regionsDataFromTemplate = {{ regions | tojson | safe }};

        // Инициализация карты после загрузки DOM
        document.addEventListener('DOMContentLoaded', function() {
            ('DOM загружен. Регионов из шаблона:', regionsDataFromTemplate.length);
            ('Первый регион:', regionsDataFromTemplate[0]);
            initAmMap(regionsDataFromTemplate);
        });
    </script>
</body>
</html>
